id: no-create-event-dispatcher
valid:
  - |
    <script lang="ts">
      let { onSave }: { onSave: () => void } = $props()
      onSave()
    </script>
invalid:
  - |
    <script lang="ts">
      import { createEventDispatcher } from "svelte"
      const dispatch = createEventDispatcher()
      dispatch("save")
    </script>
